server:
  port: 18080

spring:
  application:
    name: music-online-backend
  datasource:
    url: jdbc:mysql://localhost:3306/music_online?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

music-online:
  database:
    schema-ready: false
    note: Remove the temporary datasource exclusion after executing the schema in the local MySQL instance.
